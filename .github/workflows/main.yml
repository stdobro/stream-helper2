name: Stream_Safe_6_Updated
on:
  workflow_dispatch:

jobs:
  viewer_farm:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Количество ботов (можно менять от 1 до 10-15)
        id: [1, 2, 3, 4, 5]
    steps:
      - name: Install Streamlink
        run: |
          python3 -m pip install --upgrade streamlink

      - name: Run Viewer with Health Check
        run: |
          # 1. Проверяем, онлайн ли канал
          if ! streamlink --can-handle-url https://www.twitch.tv/lepestqchek; then
            echo "Ошибка: Канал оффлайн или ссылка неверна."
            exit 1
          fi

          # 2. Плавный вход: каждый бот заходит с интервалом в 15 секунд
          WAIT_TIME=$(( (${{ matrix.id }} - 1) * 15 ))
          echo "Бот №${{ matrix.id }} ожидает $WAIT_TIME секунд перед подключением..."
          sleep $WAIT_TIME

          # 3. Запуск основного процесса
          # Мы используем --stdout > /dev/null, чтобы не было ошибки плеера VLC
          # Мы НЕ используем '&', чтобы GitHub Actions видел, что процесс активен (синий кружок)
          echo "Бот №${{ matrix.id }} запущен и имитирует просмотр..."
          streamlink --loglevel info \
            --retry-streams 30 \
            --retry-max 5 \
            --twitch-disable-ads \
            --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            https://www.twitch.tv/mik04ka worst --stdout > /dev/null
