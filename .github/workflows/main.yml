- name: Run Viewer with Fix
        run: |
          # 1. Проверка стрима
          if ! streamlink --can-handle-url https://www.twitch.tv/lepestqchek; then
            echo "Ошибка: Стрим недоступен."
            exit 1
          fi

          # 2. Плавный вход
          WAIT_TIME=$(( (${{ matrix.id }} - 1) * 15 ))
          echo "Ожидание $WAIT_TIME сек..."
          sleep $WAIT_TIME

          # 3. Исправленный запуск
          # Добавлен --stdout и перенаправление > /dev/null
          # Убран '&', чтобы процесс оставался активным для GitHub
          echo "Бот №${{ matrix.id }} в деле..."
          streamlink --loglevel info \
            --retry-streams 30 \
            --retry-max 5 \
            --twitch-disable-ads \
            --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            https://www.twitch.tv/lepestqchek worst --stdout > /dev/null
