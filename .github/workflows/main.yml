name: Stream_Safe_6
on:
  workflow_dispatch:

jobs:
  viewer_farm:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Оптимальное количество для стабильной работы
        id: [1, 2, 3, 4, 5]
    steps:
      - name: Install Streamlink
        run: |
          python3 -m pip install --upgrade streamlink
      
      - name: Run Viewer
        run: |
          # Плавный вход: каждый бот заходит с интервалом в 15 секунд
          sleep $(( (${{ matrix.id }} - 1) * 15 ))
          streamlink --retry-streams 30 --retry-max 5 --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/122.0.0.0" https://www.twitch.tv/coolreder audio_only --stdout > /dev/null &
          sleep 21600
